  _cfg_banner: "URL to image banner"
  desc: "<emoji document_id=5470093614023449749>⛄️</emoji> <b>Userbot — what is it?</b>\n\n<emoji document_id=5472238129849048175>😎</emoji> A userbot refers to a <b>third-party program</b> that interacts with the Telegram API to perform <b>automated tasks on behalf of a user</b>. These userbots can be used to automate various tasks such as <b>sending messages, joining channels, downloading media, and much more</b>.\n\n<emoji document_id=5474667187258006816>😎</emoji> Userbots are different from regular Telegram bots as <b>they run on the user's account</b> rather than a bot account. This means that userbots can access more features and have greater flexibility in terms of the actions they can perform.\n\n<emoji document_id=5472267631979405211>🚫</emoji> However, it is important to note that <b>userbots are not officially supported by Telegram</b> and their use may violate the platform's terms of service. As such, <b>users should exercise caution when using userbots</b> and ensure that they are not being used for malicious purposes.\n\n"
  _cmd_doc_hikkainfo: "Send info aka 'What is LidFax?'"
  _cmd_doc_info: "Send userbot info"
  _cmd_doc_setinfo: "<text> - Change text in .info"
  _ihandle_doc_info: "Send userbot info"
  _cls_doc: "Show userbot info"

