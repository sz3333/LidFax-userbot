quickstart:
  base: "☃️🇰🇿 <b>Сәлем.</b> Сіздің <b>LidFax</b> юзерботыңыз орнатылды.\n\n❓ <b>Көмек қажет пе?</b> Біздің қолдау чатына қосылыңыз. Біз <b>барлығына</b> көмектесеміз.\n\n📼 <b>Сіз модульдерді</b> <code>.heta</code> <b>арқылы іздеп, орната аласыз. Жай ғана іздеу сұрауын енгізіңіз және қажетті модульде ⛩ Install батырмасын басыңыз</b>\n\n📣 <b>Қауымдастық жасаған модульдері бар арналарға қараңыз: <a href=\"https://t.me/lidfax_ub/2\">көрсету</a></b>\n\n💁‍♀️ <b>Жылдам нұсқаулық:</b>\n\n1️⃣ <b>Модульдер тізімін көру үшін</b> <code>.help</code> <b>жазыңыз</b>\n2️⃣ <b>Модульдің сипаттамасын көру үшін</b> <code>.help &lt;Модуль/пәрмен атауы&gt;</code> <b>жазыңыз</b>\n3️⃣ <b>Сілтемеден модульді жүктеу үшін</b> <code>.dlmod &lt;сілтеме&gt;</code> <b>жазыңыз</b>\n4️⃣ <b>Файлдан модульді жүктеу үшін файлға жауап ретінде</b> <code>.loadmod</code> <b>жазыңыз</b>\n5️⃣ <b>Модульді жүктеуді тоқтату үшін</b> <code>.unloadmod &lt;Модуль атауы&gt;</code> <b>жазыңыз</b>\n\n💡 <b>LidFax Friendly-Telegram және GeekTG модульдерін, сондай-ақ өзінің жеке модульдерін қолдайды.</b>\n"
  railway: "🚂 <b>Сіздің юзерботыңыз Railway-де орнатылған</b>. Бұл платформада сіз айына тек <b>500 тегін сағат</b> аласыз. Лимит жеткенде, сіздің <b>юзерботыңыз қатырылады</b>. Келесі айда <b>сіз https://railway.app сайтына өтіп, оны қайта іске қосуыңыз керек</b>."
  lavhost: "✌️ <b>Сіздің юзерботыңыз lavHost-та орнатылған</b>. Маңызды хабарламалар мен жаңартуларды алу үшін @lavhost-қа қосылыңыз. Платформаға байланысты барлық сұрақтар @lavhostchat-қа қойылуы керек."
  language_saved: "🇰🇿 Тіл сақталды!"
  language: "🇰🇿 Қазақша"
  btn_support: "🥷 Қолдау чаты"

